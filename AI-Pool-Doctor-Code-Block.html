<div id="ai-pool-dr">
  <style>
    #ai-pool-dr {
      max-width: 800px;
      margin: 30px auto;
      padding: 26px;
      border-radius: 22px;
      background: linear-gradient(135deg, #f3fbff, #ffffff);
      border: 1px solid #d8ecf7;
      font-family: Arial, sans-serif;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
    }
    #ai-pool-dr h2 { margin-top: 0; font-size: 32px; color: #053b5c; }
    #ai-pool-dr p { font-size: 16px; color: #333; }
    #ai-pool-dr input, #ai-pool-dr textarea {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border-radius: 14px;
      border: 1px solid #b8cbd8;
      font-size: 16px;
      box-sizing: border-box;
    }
    #poolQuestion { min-height: 120px; }
    #poolPhoto {
      border: 1px dashed #89bdda;
      background: #fff;
    }
    #preview img {
      margin-top: 14px;
      max-width: 100%;
      border-radius: 16px;
      border: 1px solid #ccc;
    }
    #analyzeBtn {
      margin-top: 18px;
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      background: #0077cc;
      color: white;
      font-size: 19px;
      font-weight: bold;
      cursor: pointer;
    }
    #analyzeBtn:hover { background: #005fa3; }
    #poolResult {
      margin-top: 22px;
      padding: 18px;
      border-radius: 16px;
      background: #ffffff;
      border: 1px solid #d8ecf7;
      display: none;
      white-space: pre-wrap;
      line-height: 1.5;
    }
    .service-btn {
      display: block;
      margin-top: 18px;
      text-align: center;
      padding: 15px;
      border-radius: 12px;
      background: #00a859;
      color: white !important;
      text-decoration: none;
      font-weight: bold;
    }
    .small-note {
      font-size: 13px;
      color: #666;
      margin-top: 10px;
    }
  </style>

  <h2>🩺 AI Pool Doctor</h2>
  <p>Upload a pool or equipment photo, describe the problem, and get instant troubleshooting guidance from Michiana Pool Dr.</p>

  <input id="customerName" placeholder="Your name">
  <input id="customerPhone" placeholder="Phone number">
  <input id="customerEmail" placeholder="Email address">
  <textarea id="poolQuestion" placeholder="Example: My pool is green and cloudy, the filter pressure is high, and the pump has been running all day..."></textarea>

  <input id="poolPhoto" type="file" accept="image/*">
  <div id="preview"></div>

  <button id="analyzeBtn" onclick="analyzePool()">Analyze My Pool</button>

  <div id="poolResult"></div>
  <p class="small-note">For heater, gas, electrical, major leak, or safety issues, schedule professional service.</p>
</div>

<script>
  const AI_POOL_DOCTOR_ENDPOINT = "PASTE_YOUR_VERCEL_URL_HERE/api/pool-doctor";

  const photoInput = document.getElementById("poolPhoto");
  const preview = document.getElementById("preview");

  photoInput.addEventListener("change", function () {
    const file = photoInput.files[0];
    if (!file) return;

    if (file.size > 8 * 1024 * 1024) {
      alert("Please upload an image smaller than 8MB.");
      photoInput.value = "";
      return;
    }

    const reader = new FileReader();
    reader.onload = function (e) {
      preview.innerHTML = '<img src="' + e.target.result + '" alt="Uploaded pool photo">';
    };
    reader.readAsDataURL(file);
  });

  async function analyzePool() {
    const name = document.getElementById("customerName").value.trim();
    const phone = document.getElementById("customerPhone").value.trim();
    const email = document.getElementById("customerEmail").value.trim();
    const question = document.getElementById("poolQuestion").value.trim();
    const photo = document.getElementById("poolPhoto").files[0];
    const result = document.getElementById("poolResult");
    const btn = document.getElementById("analyzeBtn");

    if (!question && !photo) {
      result.style.display = "block";
      result.innerHTML = "Please describe the issue or upload a photo first.";
      return;
    }

    if (AI_POOL_DOCTOR_ENDPOINT.includes("PASTE_YOUR_VERCEL_URL_HERE")) {
      result.style.display = "block";
      result.innerHTML = "Backend not connected yet. Replace PASTE_YOUR_VERCEL_URL_HERE with your Vercel project URL.";
      return;
    }

    const formData = new FormData();
    formData.append("name", name);
    formData.append("phone", phone);
    formData.append("email", email);
    formData.append("question", question);
    if (photo) formData.append("photo", photo);

    result.style.display = "block";
    result.innerHTML = "🩺 AI Pool Doctor is analyzing your pool issue...";
    btn.disabled = true;
    btn.innerText = "Analyzing...";

    try {
      const response = await fetch(AI_POOL_DOCTOR_ENDPOINT, {
        method: "POST",
        body: formData
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.error || "Analysis failed.");
      }

      const mailBody = encodeURIComponent(
        "Name: " + name + "\n" +
        "Phone: " + phone + "\n" +
        "Email: " + email + "\n\n" +
        "Customer issue:\n" + question + "\n\n" +
        "AI result:\n" + data.answer
      );

      result.innerHTML =
        data.answer +
        '\n\n<a class="service-btn" href="mailto:contact@michianapooldr.com?subject=AI Pool Doctor Service Request&body=' + mailBody + '">Request Michiana Pool Dr Service</a>';
    } catch (error) {
      result.innerHTML = "Something went wrong: " + error.message + "\n\nPlease contact Michiana Pool Dr at contact@michianapooldr.com or 574-208-4688.";
    } finally {
      btn.disabled = false;
      btn.innerText = "Analyze My Pool";
    }
  }
</script>
